<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问卷调查表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 20px;
        }
        .card {
            max-width: 700px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.07);
        }
        .title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .item {
            margin-bottom: 22px;
        }
        .label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .required {
            color: red;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .radio-group, .checkbox-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .btn-box {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }
        .submit {
            background: #409eff;
            color: white;
        }
        .reset {
            background: #f5f5f5;
            border: 1px solid #ddd;
        }
        .tip {
            text-align: center;
            padding: 20px;
            color: #00b42a;
            background: #e6ffed;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2 class="title">📝 问卷调查表</h2>
        <p class="subtitle">感谢您抽出宝贵时间填写本次问卷</p>

        <form action="https://submit-form.com/gnN1nYVa" method="POST">
            <div class="item">
                <label class="label"><span class="required">*</span>您的姓名</label>
                <input type="text" name="姓名" required placeholder="请输入姓名">
            </div>

            <div class="item">
                <label class="label"><span class="required">*</span>您的性别</label>
                <div class="radio-group">
                    <label><input type="radio" name="性别" value="男" required> 男</label>
                    <label><input type="radio" name="性别" value="女"> 女</label>
                </div>
            </div>

            <div class="item">
                <label class="label">您的年龄</label>
                <select name="年龄">
                    <option value="">请选择</option>
                    <option>18岁以下</option>
                    <option>18岁</option>
                    <option>19岁</option>
                    <option>20岁</option>
                    <option>21岁以上</option>
                </select>
            </div>

            <div class="item">
                <label class="label"><span class="required">*</span>对班长满意度</label>
                <div class="radio-group">
                    <label><input type="radio" name="班长" value="非常满意" required>非常满意</label>
                    <label><input type="radio" name="班长" value="满意">满意</label>
                    <label><input type="radio" name="班长" value="一般">一般</label>
                    <label><input type="radio" name="班长" value="不满意">不满意</label>
                </div>
            </div>

            <div class="item">
                <label class="label"><span class="required">*</span>对副班长满意度</label>
                <div class="radio-group">
                    <label><input type="radio" name="副班长" value="非常满意" required>非常满意</label>
                    <label><input type="radio" name="副班长" value="满意">满意</label>
                    <label><input type="radio" name="副班长" value="一般">一般</label>
                    <label><input type="radio" name="副班长" value="不满意">不满意</label>
                </div>
            </div>

            <div class="item">
                <label class="label"><span class="required">*</span>对学习委员满意度</label>
                <div class="radio-group">
                    <label><input type="radio" name="学习委员" value="非常满意" required>非常满意</label>
                    <label><input type="radio" name="学习委员" value="满意">满意</label>
                    <label><input type="radio" name="学习委员" value="一般">一般</label>
                    <label><input type="radio" name="学习委员" value="不满意">不满意</label>
                </div>
            </div>

            <div class="item">
                <label class="label"><span class="required">*</span>对团支书满意度</label>
                <div class="radio-group">
                    <label><input type="radio" name="团支书" value="非常满意" required>非常满意</label>
                    <label><input type="radio" name="团支书" value="满意">满意</label>
                    <label><input type="radio" name="团支书" value="一般">一般</label>
                    <label><input type="radio" name="团支书" value="不满意">不满意</label>
                </div>
            </div>

            <div class="item">
                <label class="label"><span class="required">*</span>对组织委员满意度</label>
                <div class="radio-group">
                    <label><input type="radio" name="组织委员" value="非常满意" required>非常满意</label>
                    <label><input type="radio" name="组织委员" value="满意">满意</label>
                    <label><input type="radio" name="组织委员" value="一般">一般</label>
                    <label><input type="radio" name="组织委员" value="不满意">不满意</label>
                </div>
            </div>

            <div class="item">
                <label class="label">兴趣爱好（可多选）</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="爱好" value="跑步">跑步</label>
                    <label><input type="checkbox" name="爱好" value="羽毛球">羽毛球</label>
                    <label><input type="checkbox" name="爱好" value="篮球">篮球</label>
                    <label><input type="checkbox" name="爱好" value="足球">足球</label>
                    <label><input type="checkbox" name="爱好" value="阅读">阅读</label>
                    <label><input type="checkbox" name="爱好" value="画画">画画</label>
                    <label><input type="checkbox" name="爱好" value="唱歌">唱歌</label>
                    <label><input type="checkbox" name="爱好" value="健身">健身</label>
                    <label><input type="checkbox" name="爱好" value="游戏">游戏</label>
                    <label><input type="checkbox" name="爱好" value="旅游">旅游</label>
                </div>
            </div>

            <div class="item">
                <label class="label"><span class="required">*</span>未来规划（40-100字）</label>
                <textarea name="规划" rows="4" required maxlength="100" placeholder="请输入规划"></textarea>
            </div>

            <div class="btn-box">
                <button type="submit" class="submit">提交问卷</button>
                <button type="reset" class="reset">重新填写</button>
            </div>
        </form>

        <div id="success" class="tip">✅ 提交成功！感谢参与</div>
    </div>
</body>
</html>
